name: Collect encrypted GoalsGraph backup

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: Exercise the independent alert path without accessing production.
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: goalsgraph-backup-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Controlled alert test
        if: ${{ inputs.simulate_failure }}
        run: exit 1

      - name: Fetch latest ciphertext only
        run: |
          curl --fail --silent --show-error --proto '=https' --tlsv1.2 --user "${BACKUP_EXPORT_HTTP_USER}:${BACKUP_EXPORT_HTTP_PASSWORD}" "${BACKUP_EXPORT_URL}" > /tmp/goalsgraph-backup.tar
        env:
          BACKUP_EXPORT_HTTP_USER: ${{ secrets.BACKUP_EXPORT_HTTP_USER }}
          BACKUP_EXPORT_HTTP_PASSWORD: ${{ secrets.BACKUP_EXPORT_HTTP_PASSWORD }}
          BACKUP_EXPORT_URL: ${{ secrets.BACKUP_EXPORT_URL }}

      - name: Verify and archive ciphertext
        run: ./scripts/collect-backup.sh /tmp/goalsgraph-backup.tar "$GITHUB_WORKSPACE"

      - name: Open independent alert receipt
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/open-alert.sh

      - name: Resolve independent alert receipt
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/close-alert.sh
